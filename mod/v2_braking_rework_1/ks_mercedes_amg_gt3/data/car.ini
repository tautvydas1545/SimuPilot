VIRTUAL_MIRROR_ENABLED=0
USE_ANIMATED_SUSPENSIONS=0
SHAKE_MUL=3				; Camera onboard G forces multiplier
FUEL_LIGHT_MIN_LITERS=10
BONNET_CAMERA_PITCH=0.000000

[CONTROLS]
FFMULT=0.865
STEER_ASSIST=1.000
STEER_LOCK=320					; Real car's steer lock from center to right
