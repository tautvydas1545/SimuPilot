[HEADER]
VERSION=10

[VIRTUALKM]
USE_LOAD=1

[COMPOUND_DEFAULT]
INDEX=1

; SOFT

[FRONT]
NAME=Slick Soft
SHORT_NAME=S
WIDTH=0.315
RADIUS=0.340				; tyre radius in meters
RIM_RADIUS=0.2413			; rim radius in meters (use 1 inch more than nominal)
ANGULAR_INERTIA=1.75							; angular inertia of front rim+tyre+brake disc together
DAMP=500									; Damping rate of front tyre in N sec/m (values usualy from 200 to 1400)
RATE=280470									; Spring rate of front tyres in Nm
DY0=1.6678
DY1=-0.040
DX0=1.5778
DX1=-0.040
WEAR_CURVE=slicksGT3s_front.lut		; file with lookup table to call
SPEED_SENSITIVITY=0.002627		; speed sensitivity value
RELAXATION_LENGTH=0.09883		
ROLLING_RESISTANCE_0=10		; rolling resistance constant component
ROLLING_RESISTANCE_1=0.000215		; rolling resistance velocity (squared) component
ROLLING_RESISTANCE_SLIP=5261		; rolling reistance slip angle component		
FLEX=0.000606						; tire profile flex. the bigger the number the bigger the flex, the bigger the added slipangle with load.
CAMBER_GAIN=0.134					; Camber gain value as slipangle multiplayer. default 1
DCAMBER_0=1.65
DCAMBER_1=-13						; D dependency on camber. D=D*(1.0 - (camberRAD*DCAMBER_0 + camberRAD^2 * DCAMBER_1)) , camberRAD=absolute value of camber in radians
FRICTION_LIMIT_ANGLE=6.12	
XMU=0.17
PRESSURE_STATIC=16 ; STATIC (COLD) PRESSURE
PRESSURE_SPRING_GAIN=13154 ; INCREASE IN N/m  per psi (from 26psi reference)
PRESSURE_FLEX_GAIN=0.35 ; INCREASE IN FLEX per psi
PRESSURE_RR_GAIN=0.4 ; INCREASE IN RR RESISTENCE per psi
PRESSURE_D_GAIN=0.005	;loss of tyre footprint with pressure rise.
PRESSURE_IDEAL=26			;Ideal pressure for grip
FZ0=3787
LS_EXPY=0.7917
LS_EXPX=0.87
DY_REF=1.56
DX_REF=1.54
FLEX_GAIN=0.0159
FALLOFF_LEVEL=0.85
FALLOFF_SPEED=3
CX_MULT=1.0
RADIUS_ANGULAR_K=0.007  ; Radius grows of MILLIMITERS!! Formula -> RADIUS_ANGULAR_K * angularVelocity in rad/s
BRAKE_DX_MOD=0.06

